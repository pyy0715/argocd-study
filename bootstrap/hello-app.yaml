apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hello
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  # docs/02-image-updater.md 단계에서 아래 annotation을 이 Application에 추가합니다.
  # annotations:
  #   argocd-image-updater.argoproj.io/image-list: hello=ghcr.io/YOUR_USERNAME/argocd-study/hello
  #   argocd-image-updater.argoproj.io/hello.update-strategy: newest-build
  #   argocd-image-updater.argoproj.io/hello.pull-secret: pullsecret:argocd/ghcr-creds
  #   argocd-image-updater.argoproj.io/write-back-method: git
  #   argocd-image-updater.argoproj.io/git-branch: main
spec:
  project: default
  source:
    # TODO: replace YOUR_USERNAME with your GitHub account.
    repoURL: https://github.com/YOUR_USERNAME/argocd-study.git
    targetRevision: main
    path: app
  destination:
    server: https://kubernetes.default.svc
    namespace: hello
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
