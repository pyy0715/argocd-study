
apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: hello
  labels:
    app: hello
spec:
  replicas: 5
  selector:
    matchLabels:
      app: hello
  template:
    metadata:
      labels:
        app: hello
    spec:
      containers:
        - name: hello
          image: ghcr.io/pyy0715/argocd-study/hello:latest
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
  strategy:
    canary:
      # Traffic manager가 없는 k3s에서는 replica 비율로 근사 canary weight를 구현합니다.
      # 정교한 weight(1%, 5%)는 ALB, Istio, Gateway API 연결이 필요합니다.
      steps:
        - setWeight: 20
        - pause: { duration: 30s }
        - setWeight: 40
        - pause: { duration: 30s }
        - setWeight: 60
        - pause: { duration: 30s }
        - setWeight: 80
        - pause: { duration: 30s }
        - setWeight: 100
